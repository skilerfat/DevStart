<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DevStart</title>
<link rel="stylesheet" href="../Css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="topo">
    <div class="logo"><i class="fa-solid fa-graduation-cap"></i> DevStart</div>
    <nav>
        <a class="ativo" href="login.html">Login</a>
        <a  href="contato.html">Contato</a>
        <a  href="index.html">Início</a>
    </nav>
</header>
<style>
.ativo {
    font-weight: bold;
}
</style>

<div class="container">
    <div class="card">

        <h1>Bem-vindo de volta!</h1>
        <p>Entre para continuar aprendendo</p>

        <form>

            <label>E-mail</label>
            <div class="input-box">
                <input type="email" placeholder="seu@email.com">
            </div>

            <label>Senha</label>
            <div class="input-box">
                <input type="password" placeholder="••••••••">
            </div>

            <div class="opcoes">
                <label>
                    <input type="checkbox"> Lembrar-me
                </label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn">Entrar</button>

            <p class="cadastro">
                Não tem uma conta? <a href="#">Cadastre-se</a>
            </p>

            <div class="divider">Ou continue com</div>

            <div class="social">
                <button type="button">Google</button>
                <button type="button">GitHub</button>
            </div>

            <p class="termos">
                Ao continuar, você concorda com nossos 
                <a href="#">Termos de Uso</a> e 
                <a href="#">Política de Privacidade</a>
            </p>

        </form>
    </div>
</div>
<footer>
    © 2026 DevStart. Todos os direitos reservados.
</footer>
</body>
</html>
